<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Reader | المصحف العالمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a472a;
            --accent-color: #c19a6b;
            --bg-color: #f9f7f2;
        }
        body {
            font-family: 'Scheherazade New', serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* تصميم القائمة الجانبية */
        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 999;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .side-menu.active { right: 0; }
        .menu-item {
            padding: 15px 25px;
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .menu-item:hover { background: #f5f5f5; }

        /* منطقة المحتوى الرئيسي */
        .quran-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 650px;
            width: 85%;
            border: 1px solid #e0dacc;
        }
        .lang-selector { margin-bottom: 15px; text-align: left; }
        [dir="rtl"] .lang-selector { text-align: right; }
        .ayah-text { font-family: 'Amiri Quran', serif; font-size: 2rem; line-height: 3.8rem; margin: 20px 0; min-height: 100px; }
        .translation-text { font-size: 1.1rem; color: #555; font-style: italic; margin-bottom: 20px; }
        .controls-wrapper { display: flex; flex-direction: column; gap: 12px; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn { flex: 1; background: var(--primary-color); color: white; padding: 12px; border-radius: 12px; border: none; cursor: pointer; }
        .audio-btn { background: var(--accent-color); color: white; padding: 12px; border-radius: 12px; border: none; cursor: pointer; width: 100%; }
        
        /* نافذة التواصل */
        #contact-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center;
        }
        textarea { width: 100%; height: 100px; margin: 15px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div id="side-menu" class="side-menu">
        <div class="menu-item" onclick="downloadPage()">📥 تحميل صفحة الموقع مجاناً</div>
        <div class="menu-item" onclick="goToHome()">🏠 التوجه للصفحة الرئيسية</div>
        <div class="menu-item" onclick="openContact()">📧 التواصل والدعم</div>
    </div>

    <div class="quran-container">
        <div class="lang-selector">
            <select id="languages" onchange="changeLanguage()">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="it">Italiano</option>
                <option value="id">Bahasa Indonesia</option>
            </select>
        </div>

        <div id="surah-info" style="font-weight: bold; color: var(--primary-color);">...</div>
        <div id="ayah-display" class="ayah-text">...</div>
        <div id="translation-display" class="translation-text"></div>

        <div class="controls-wrapper">
            <audio id="quran-audio" onended="stopAudio()"></audio>
            <button id="play-btn" class="audio-btn" onclick="toggleAudio()">▶️ استماع للآية</button>
            <div class="nav-buttons">
                <button id="prev-btn" class="nav-btn" onclick="changeAyah(-1)">السابقة</button>
                <button id="next-btn" class="nav-btn" onclick="changeAyah(1)">التالية</button>
            </div>
        </div>
    </div>

    <div id="contact-modal">
        <div class="modal-content">
            <h3>أرسل رسالتك لنا</h3>
            <textarea id="user-message" placeholder="اكتب رسالتك هنا..."></textarea>
            <button class="nav-btn" onclick="sendEmail()">إرسال عبر البريد</button>
            <button onclick="closeContact()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <script>
        // 1. وظائف القائمة
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        
        function downloadPage() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'quran-reader.html';
            a.click();
        }

        function goToHome() { window.location.href = 'index.html'; }

        function openContact() { document.getElementById('contact-modal').style.display = 'flex'; toggleMenu(); }
        function closeContact() { document.getElementById('contact-modal').style.display = 'none'; }

        function sendEmail() {
            const msg = document.getElementById('user-message').value;
            const email = "kintav@zohomail.eu";
            const subject = encodeURIComponent("رسالة من مستخدم تطبيق القرآن");
            const body = encodeURIComponent(msg);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
            closeContact();
        }

        // 2. منطق القرآن (نفس المنطق السابق مع تحسينات)
        const langConfig = {
            ar: { dir: 'rtl', trans: null },
            en: { dir: 'ltr', trans: 'en.sahih' },
            fr: { dir: 'ltr', trans: 'fr.hamidullah' },
            it: { dir: 'ltr', trans: 'it.piccardo' },
            id: { dir: 'ltr', trans: 'id.indonesian' }
        };

        let currentAyah = parseInt(localStorage.getItem('lastAyah')) || 1;
        let currentLang = 'ar';

        async function fetchAyah(number) {
            const config = langConfig[currentLang];
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/ayah/${number}/ar.alafasy`);
                const data = await res.json();
                document.getElementById('ayah-display').innerText = data.data.text;
                document.getElementById('surah-info').innerText = "سورة " + data.data.surah.name;
                document.getElementById('quran-audio').src = data.data.audio;

                if (config.trans) {
                    const resT = await fetch(`https://api.alquran.cloud/v1/ayah/${number}/${config.trans}`);
                    const dataT = await resT.json();
                    document.getElementById('translation-display').innerText = dataT.data.text;
                } else {
                    document.getElementById('translation-display').innerText = "";
                }
                localStorage.setItem('lastAyah', number);
            } catch (e) { console.log("Error"); }
        }

        function changeLanguage() {
            currentLang = document.getElementById('languages').value;
            document.body.dir = langConfig[currentLang].dir;
            fetchAyah(currentAyah);
        }

        function changeAyah(step) {
            currentAyah += step;
            if (currentAyah < 1) currentAyah = 1;
            fetchAyah(currentAyah);
        }

        let isPlaying = false;
        function toggleAudio() {
            const audio = document.getElementById('quran-audio');
            if (isPlaying) { audio.pause(); isPlaying = false; document.getElementById('play-btn').innerText = "▶️ استماع"; }
            else { audio.play(); isPlaying = true; document.getElementById('play-btn').innerText = "⏸️ إيقاف"; }
        }
        function stopAudio() { isPlaying = false; document.getElementById('play-btn').innerText = "▶️ استماع"; }

        // تشغيل تلقائي حسب لغة المتصفح
        const browserLang = navigator.language.split('-')[0];
        if (langConfig[browserLang]) {
            currentLang = browserLang;
            document.getElementById('languages').value = browserLang;
            document.body.dir = langConfig[browserLang].dir;
        }

        fetchAyah(currentAyah);
    </script>
</body>
</html>
