<!DOCTYPE html>
<html lang="ar" dir="rtl" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نور النبوة - الإصدار الذكي</title>
    <style>
        :root {
            --primary: #004d40;
            --accent: #00bfa5;
            --bg: #f8fafb;
            --card: #ffffff;
            --text: #2c3e50;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* الهيدر */
        header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .menu-icon { font-size: 24px; cursor: pointer; padding: 5px; }

        .lang-picker {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 4px;
            font-size: 0.8rem;
            outline: none;
        }

        /* القائمة الجانبية */
        .side-menu {
            position: fixed;
            top: 0; right: -100%;
            width: 75%; height: 100%;
            background: white;
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            padding: 20px;
        }
        .side-menu.active { right: 0; }
        .side-menu a, .side-menu button {
            display: block; width: 100%; text-align: right;
            padding: 15px; text-decoration: none; color: var(--text);
            font-weight: 600; border: none; background: none;
            border-bottom: 1px solid #f0f0f0; font-size: 1rem;
            cursor: pointer;
        }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; z-index: 1500;
        }

        /* منطقة الحديث */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .hadith-card {
            background: var(--card);
            width: 100%;
            max-width: 380px;
            height: 52vh;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            text-align: center;
        }

        .badge {
            background: #e0f2f1;
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            align-self: center;
            margin-bottom: 20px;
        }

        .hadith-text {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            line-height: 1.7;
            color: var(--text);
            font-weight: 500;
            overflow-y: auto;
        }

        .audio-btn {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 60px; height: 60px;
            margin: 20px auto 0;
            font-size: 1.6rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,191,165,0.3);
        }

        /* الفوتر الاحترافي المرفوع */
        footer {
            background: white;
            padding: 20px 20px 85px 20px; /* تم الرفع لضمان الراحة */
            border-top: 1px solid #eee;
            border-radius: 40px 40px 0 0;
        }

        .nav-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn {
            border: none;
            border-radius: 20px;
            height: 65px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #cfd8dc; color: #37474f; }
        
        .jump-btns {
            grid-column: span 2;
            display: flex; gap: 10px; margin-bottom: 12px;
        }
        .jump-btns button {
            flex: 1; height: 42px; border: none; border-radius: 12px;
            background: #f5f5f5; color: #888; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="side-menu" id="sideMenu">
    <div style="padding: 15px; font-weight: bold; color: var(--primary); font-size: 1.2rem; border-bottom: 2px solid var(--accent);">القائمة الرئيسية</div>
    <a href="index.html">🏠 الصفحة الرئيسية</a>
    <button onclick="location.reload()">🔄 تحديث الصفحة</button>
    <button onclick="resetProgress()" style="color: #d32f2f;">🗑️ مسح السجل والبدء من جديد</button>
    <button onclick="toggleMenu()" style="background: #f5f5f5; margin-top: 20px; border-radius: 10px;">إغلاق القائمة</button>
</nav>

<header>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <div style="font-weight: 800; font-size: 1.1rem;">نور النبوة</div>
    <select class="lang-picker" id="vLang" onchange="updateLangCookie()">
        <option value="ar-SA">العربية</option>
        <option value="en-US">English</option>
        <option value="id-ID">Indonesia</option>
        <option value="fr-FR">Français</option>
        <option value="ru-RU">Русский</option>
        <option value="zh-CN">中文</option>
        <option value="ko-KR">한국어</option>
    </select>
</header>

<main>
    <div class="hadith-card">
        <div class="badge" id="counter">الحديث الشريف 1 / 200</div>
        <div class="hadith-text" id="hContent">...</div>
        <button class="audio-btn" onclick="playAudio()" id="speakBtn">🔊</button>
    </div>
</main>

<footer>
    <div class="nav-btns">
        <div class="jump-btns">
            <button onclick="goTo(0)">الأول</button>
            <button onclick="goTo(199)">الأخير</button>
        </div>
        <button class="btn btn-prev" id="btnPrev" onclick="nav(-1)">السابق</button>
        <button class="btn btn-next" id="btnNext" onclick="nav(1)">التالي</button>
    </div>
</footer>

<script>
    // مصفوفة الـ 200 حديث
    const ahadith = [
        "إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى.", "من كان يؤمن بالله واليوم الآخر فليقل خيراً أو ليصمت.", "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه.", "المسلم من سلم المسلمون من لسانه ويده.", "الدين النصيحة.", "اتق الله حيثما كنت، وأتبع السيئة الحسنة تمحها.", "احفظ الله يحفظك، احفظ الله تجده تجاهك.", "إذا سألت فاسأل الله، وإذا استعنت فاستعن بالله.", "يسروا ولا تعسروا، وبشروا ولا تنفروا.", "من سلك طريقاً يلتمس فيه علماً سهل الله له به طريقاً إلى الجنة.",
        "الدال على الخير كفاعله.", "من لا يرحم لا يُرحم.", "اتقوا النار ولو بشق تمرة.", "الطهور شطر الإيمان.", "الحمد لله تملأ الميزان.", "سبحان الله وبحمده سبحان الله العظيم.", "لا حول ولا قوة إلا بالله كنز من كنوز الجنة.", "أفضل الذكر لا إله إلا الله.", "الكلمة الطيبة صدقة.", "تبسمك في وجه أخيك لك صدقة.",
        "من غشنا فليس منا.", "خيركم من تعلم القرآن وعلمه.", "من يرد الله به خيراً يفقهه في الدين.", "لا يدخل الجنة من كان في قلبه مثقال ذرة من كبر.", "أحب الأعمال إلى الله أدومها وإن قل.", "أقرب ما يكون العبد من ربه وهو ساجد.", "من صلى علي صلاة صلى الله عليه بها عشراً.", "ما نقصت صدقة من مال.", "ليس الشديد بالصرعة، إنما الشديد الذي يملك نفسه عند الغضب.", "الحياء لا يأتي إلا بخير.",
        "من صام رمضان إيماناً واحتساباً غفر له ما تقدم من ذنبه.", "نعمتان مغبون فيهما كثير من الناس: الصحة والفراغ.", "كل مسكر خمر، وكل خمر حرام.", "المرء مع من أحب.", "اتق دعوة المظلوم.", "من بنى لله مسجداً بنى الله له بيتاً في الجنة.", "أحب الكلام إلى الله: سبحان الله، والحمد لله، ولا إله إلا الله، والله أكبر.", "من كان يؤمن بالله واليوم الآخر فليكرم ضيفه.", "من كان يؤمن بالله واليوم الآخر فليصل رحمه.", "الدعاء هو العبادة.",
        "أفضل الصدقة صدقة في رمضان.", "من دل على خير فله مثل أجر فاعله.", "استعينوا على إنجاح الحوائج بالكتمان.", "إن الله يحب إذا عمل أحدكم عملاً أن يتقنه.", "خياركم خياركم لنسائهم.", "كلكم راع وكلكم مسؤول عن رعيته.", "الدنيا سجن المؤمن وجنة الكافر.", "لا يدخل الجنة قاطع رحم.", "البر حسن الخلق.", "الإثم ما حاك في صدرك وكرهت أن يطلع عليه الناس.",
        "بشر المشائين في الظلم إلى المساجد بالنور التام يوم القيامة.", "من كذب علي متعمداً فليتبوأ مقعده من النار.", "الحياء شعبة من الإيمان.", "الإيمان بضع وسبعون شعبة.", "أفضل الإيمان الصبر والسماحة.", "إن الصدق يهدي إلى البر.", "الظلم ظلمات يوم القيامة.", "من غدا إلى المسجد أو راح أعد الله له نزلاً في الجنة.", "صلوا كما رأيتموني أصلي.", "بين الرجل وبين الشرك والكفر ترك الصلاة.",
        "رأس الأمر الإسلام وعموده الصلاة.", "أول ما يحاسب عليه العبد يوم القيامة الصلاة.", "من حافظ على الصلاة كانت له نوراً وبرهاناً.", "أفضل الصلاة بعد الفريضة صلاة الليل.", "صلاة الجماعة تفضل صلاة الفذ بسبع وعشرين درجة.", "إذا سمعتم النداء فقولوا مثل ما يقول المؤذن.", "بين كل أذانين صلاة.", "لا صلاة لمن لم يقرأ بفاتحة الكتاب.", "أسوأ الناس سرقة الذي يسرق من صلاته.", "إذا سجدت فضع كفيك وارفع مرفقيك.",
        "من توضأ فأحسن الوضوء خرجت خطاياه من جسده.", "لولا أن أشق على أمتي لأمرتهم بالسواك.", "السواك مطهرة للفم مرضاة للرب.", "لا تقبل صلاة بغير طهور.", "مفتاح الصلاة الطهور.", "تبلغ الحلية من المؤمن حيث يبلغ الوضوء.", "العمرة إلى العمرة كفارة لما بينهما.", "والحج المبرور ليس له جزاء إلا الجنة.", "أفضل الحج العج والثج.", "الحجاج والعمار وفد الله.",
        "صيام يوم عرفة يكفر السنة التي قبله والتي بعده.", "صيام يوم عاشوراء يكفر السنة التي قبله.", "أفضل الصيام بعد رمضان شهر الله المحرم.", "من صام رمضان ثم أتبعه ستاً من شوال كان كصيام الدهر.", "تسحروا فإن في السحور بركة.", "لا يزال الناس بخير ما عجلوا الفطر.", "إذا أفطر أحدكم فليفطر على تمر.", "الصيام جنة.", "إن في الجنة باباً يقال له الريان يدخل منه الصائمون.", "ما آمن بي من بات شبعان وجاره جائع.",
        "من كان له جار لا يأمن بوائقه فلا يدخل الجنة.", "خير الأصحاب عند الله خيرهم لصاحبه.", "والله في عون العبد ما كان العبد في عون أخيه.", "من ستر مسلماً ستره الله.", "من يسر على معسر يسر الله عليه.", "لا تحاسدوا ولا تناجشوا ولا تباغضوا.", "كونوا عباد الله إخواناً.", "ارحموا من في الأرض يرحمكم من في السماء.", "إن الله رفيق يحب الرفق في الأمر كله.", "من يحرم الرفق يحرم الخير.",
        "كل بني آدم خطاء وخير الخطائين التوابون.", "التائب من الذنب كمن لا ذنب له.", "الندم توبة.", "عينان لا تمسهما النار: عين بكت من خشية الله وعين باتت تحرس.", "حرم على النار كل هين لين سهل.", "من شهد الجنازة حتى يصلى عليها فله قيراط.", "أسرعوا بالجنازة.", "إنما الصبر عند الصدمة الأولى.", "من يرد الله به خيراً يصب منه.", "إذا غضب أحدكم فليسكت.",
        "الصدق طمأنينة والكذب ريبة.", "أد الأمانة إلى من ائتمنك.", "لا إيمان لمن لا أمانة له.", "من قتل معاهداً لم يرح رائحة الجنة.", "يا نساء المسلمات لا تحقرن جارة لجارتها ولو فرسن شاة.", "أنا وكافل اليتيم في الجنة هكذا.", "استوصوا بالنساء خيراً.", "خيركم خيركم لأهله.", "رضا الرب في رضا الوالد.", "الجنة تحت أقدام الأمهات.",
        "أبخل الناس من بخل بالسلام.", "يسلم الصغير على الكبير والمار على القاعد.", "لا يحل لمسلم أن يهجر أخاه فوق ثلاث ليال.", "الأرواح جنود مجندة.", "المرء على دين خليله.", "لا تصاحب إلا مؤمناً.", "مثل الجليس الصالح كحامل المسك.", "من تشبه بقوم فهو منهم.", "طلب العلم فريضة على كل مسلم.", "الحكمة ضالة المؤمن.",
        "بلغوا عني ولو آية.", "اقرؤوا القرآن فإنه يأتي يوم القيامة شفيعاً.", "خيركم من تعلم القرآن وعلمه.", "لا تجعلوا بيوتكم مقابر.", "من قرأ سورة الكهف يوم الجمعة أضاء له النور.", "دع ما يريبك إلى ما لا يريبك.", "إن الله طيب لا يقبل إلا طيباً.", "أطب مطعمك تكن مستجاب الدعوة.", "استفت قلبك.", "المؤمن مرآة المؤمن.",
        "المؤمن للمؤمن كالبنيان يشد بعضه بعضاً.", "المؤمن كالنحلة أكلت طيباً ووضعت طيباً.", "لا يلدغ المؤمن من جحر مرتين.", "أكمل المؤمنين إيماناً أحسنهم خلقاً.", "الحياء من الإيمان.", "إذا لم تستح فاصنع ما شئت.", "الحياء كله خير.", "عليكم بالسكينة.", "الأناة من الله والعجلة من الشيطان.", "كفى بالمرء كذباً أن يحدث بكل ما سمع.",
        "من نفس عن مؤمن كربة نفس الله عنه كربة.", "صنائع المعروف تقي مصارع السوء.", "صدقة السر تطفئ غضب الرب.", "سبحان الله وبحمده عدد خلقه.", "يا مقلب القلوب ثبت قلبي على دينك.", "اللهم إني أسألك الهدى والتقى.", "اللهم اكفني بحلالك عن حرامك.", "بسم الله الذي لا يضر مع اسمه شيء.", "اللهم بك أصبحنا وبك أمسينا.", "سبحان الله والحمد لله ولا إله إلا الله والله أكبر.",
        "من قال سبحان الله وبحمده في يوم مائة مرة حطت خطاياه.", "من قال لا إله إلا الله وحده لا شريك له له الملك وله الحمد وهو على كل شيء قدير.", "استغفر الله الذي لا إله إلا هو الحي القيوم وأتوب إليه.", "اللهم صل على محمد وعلى آل محمد.", "اللهم إني أعوذ بك من علم لا ينفع.", "اللهم آتنا في الدنيا حسنة وفي الآخرة حسنة.", "اللهم اهدني وسددني.", "يا حي يا قيوم برحمتك أستغيث.", "اللهم استر عوراتي وآمن روعاتي.", "حسبي الله لا إله إلا هو عليه توكلت.",
        "اللهم بارك لنا فيما رزقتنا.", "من لزم الاستغفار جعل الله له من كل هم فرجاً.", "كلمتان خفيفتان على اللسان ثقيلتان في الميزان.", "لا حول ولا قوة إلا بالله.", "سبحان الله وبحمده سبحان الله العظيم.", "من قرأ آية الكرسي دبر كل صلاة.", "أحب الأعمال إلى الله الصلاة على وقتها.", "من توضأ للموت كتب الله له كفلين من الأجر.", "من بنى مسجداً يبتغي به وجه الله بنى الله له مثله في الجنة.", "من سلك طريقاً يلتمس فيه علماً.",
        "المؤمن كالغيث أينما وقع نفع.", "أفضل الصيام صيام داود كان يصوم يوماً ويفطر يوماً.", "الطهور شطر الإيمان والحمد لله تملأ الميزان.", "لأن أقول سبحان الله والحمد لله أحب إلي مما طلعت عليه الشمس.", "من قرأ سورة الإخلاص عشر مرات بنى الله له بيتاً في الجنة.", "ما يصيب المسلم من وصب ولا نصب إلا كفر الله به من خطاياه.", "الدعاء لا يرد بين الأذان والإقامة.", "أقرب ما يكون العبد من ربه وهو ساجد.", "إذا قامت الساعة وفي يد أحدكم فسيلة فليغرسها.", "من استغفر للمؤمنين والمؤمنات كتب الله له بكل مؤمن ومؤمنة حسنة.",
        "سيد الاستغفار أن تقول اللهم أنت ربي لا إله إلا أنت.", "لا يدخل الجنة من كان في قلبه مثقال ذرة من كبر.", "البدء بالسلام قبل الكلام.", "من أطاعني فقد أطاع الله ومن عصاني فقد عصى الله.", "ما أنزل الله داء إلا أنزل له شفاء.", "التواضع لا يزيد العبد إلا رفعة.", "من أكرم كريماً فكأنما أكرم الله.", "أحب الناس إلى الله أنفعهم للناس.", "بروا آباءكم تبركم أبناؤكم.", "من كظم غيظاً وهو قادر على أن ينفذه دعاه الله على رؤوس الخلائق."
    ];

    // جلب الموضع الأخير من التخزين المحلي (Cookie/LocalStorage)
    let current = parseInt(localStorage.getItem('savedHadith')) || 0;

    function render() {
        if (current >= ahadith.length) {
            document.querySelector('main').innerHTML = `<div class="hadith-card"><h3>بارك الله فيك، أتممت القراءة.</h3><button class="btn btn-next" onclick="resetProgress()">إعادة من الحديث الأول</button></div>`;
            document.querySelector('footer').style.display = 'none';
            return;
        }
        document.getElementById('hContent').innerText = ahadith[current];
        document.getElementById('counter').innerText = `الحديث الشريف ${current + 1} / 200`;
        document.getElementById('btnPrev').disabled = (current === 0);
        
        // حفظ الموضع تلقائياً عند كل تغيير
        localStorage.setItem('savedHadith', current);
    }

    function nav(n) { current += n; render(); }
    function goTo(i) { current = i; render(); toggleMenu(); }

    // وظيفة الصوت الذكية
    function playAudio() {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(ahadith[current]);
        utter.lang = document.getElementById('vLang').value;
        window.speechSynthesis.speak(utter);
    }

    // تفعيل القائمة
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const overlay = document.getElementById('overlay');
        const active = menu.classList.toggle('active');
        overlay.style.display = active ? 'block' : 'none';
    }

    // تصفير التقدم
    function resetProgress() {
        localStorage.removeItem('savedHadith');
        location.reload();
    }

    // التعرف التلقائي على لغة المتصفح عند البدء
    window.onload = () => {
        const userLang = navigator.language || navigator.userLanguage;
        const picker = document.getElementById('vLang');
        
        // محاولة مطابقة لغة المتصفح مع الخيارات المتاحة
        for(let option of picker.options) {
            if(userLang.startsWith(option.value.split('-')[0])) {
                picker.value = option.value;
                break;
            }
        }
        render();
    };
</script>
</body>
</html>
