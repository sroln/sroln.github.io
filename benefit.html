<!DOCTYPE html>
<html lang="ar" dir="rtl" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصلحتي | المسبحة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --gold: #d4af37;
            --bg: #f8fbf9;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0f4f3 0%, #d8f3dc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* الهيدر العلوي */
        .top-bar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            z-index: 1000;
        }

        .menu-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* المسبحة بتصميم جديد */
        .tasbih-box {
            margin-top: 50px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .zekr-selector {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            color: var(--primary);
            border: 1px solid #eee;
        }

        .counter-display {
            background: #1a1a1a;
            color: #4ade80; /* لون أخضر نيون */
            font-family: 'monospace';
            font-size: 5rem;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #333;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .main-tap-area {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--accent), var(--primary));
            border-radius: 50%;
            margin: 0 auto;
            border: 10px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
            position: relative;
        }

        .main-tap-area:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .main-tap-area::after {
            content: "سبّح";
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
        }

        /* القائمة الجانبية (ثلاث شخوط) */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: var(--white);
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .side-menu.active { right: 0; }

        .menu-header { font-weight: 900; font-size: 1.5rem; color: var(--primary); margin-bottom: 30px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        .menu-link {
            padding: 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-link:hover { background: var(--light-green); color: var(--primary); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 1500;
        }
        .overlay.active { display: block; }

        .reset-btn {
            background: transparent;
            color: #ae2012;
            border: 2px solid #ae2012;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body class="notranslate"> <div class="top-bar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <div style="font-weight: 900; color: var(--primary);">نور الهداية</div>
        <div style="width: 50px;"></div> </div>

    <div class="tasbih-box">
        <div class="zekr-selector">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ</div>
        
        <div class="counter-display" id="count-val">0</div>
        
        <div class="main-tap-area" onclick="hit()"></div>
        
        <button class="reset-btn" onclick="clearCount()">إعادة ضبط</button>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <div class="menu-header">المصلحة العامة</div>
        <a href="index.html" class="menu-link">🏠 الرئيسية</a>
        <a href="azkari.html" class="menu-link">📿 أذكاري</a>
        <a href="sunna-path.html" class="menu-link">💬 السنة النبوية</a>
        <a href="halal-checker.html" class="menu-link">🔍 فاحص الحلال</a>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div style="font-size: 0.8rem; color: #999; text-align: center;">إصدار مصلحتي 2.0</div>
    </div>

    <script>
        // منع الترجمة برمجياً في بعض المتصفحات
        document.documentElement.setAttribute('lang', 'ar');
        document.documentElement.setAttribute('xml:lang', 'ar');

        let val = localStorage.getItem("benefit_count") ? parseInt(localStorage.getItem("benefit_count")) : 0;
        const display = document.getElementById("count-val");
        display.innerText = val;

        function hit() {
            val++;
            display.innerText = val;
            localStorage.setItem("benefit_count", val);
            
            // فيزون (هزاز)
            if (navigator.vibrate) {
                navigator.vibrate(40);
            }
        }

        function clearCount() {
            if(confirm("تصفير العداد؟")) {
                val = 0;
                display.innerText = val;
                localStorage.setItem("benefit_count", val);
            }
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
