<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكاري | طمأنينة القلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.9);
            --main-color: #2c5f2d; /* أخضر غامق ملكي */
            --accent-color: #97bc62;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3); /* خلفية سماوية هادئة */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* هيدر بتصميم مختلف */
        .azkar-header {
            width: 100%;
            padding: 40px 20px;
            background: var(--main-color);
            color: white;
            text-align: center;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .azkar-header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* بطاقة الذكر العائمة */
        .azkar-container {
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        .azkar-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.5s ease;
        }

        .zekr-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            line-height: 2;
            color: #1a1a1a;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* عداد التسبيح الصغير */
        .count-circle {
            width: 80px;
            height: 80px;
            border: 5px solid var(--main-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--main-color);
            cursor: pointer;
            transition: 0.3s;
            background: white;
        }

        .count-circle:active { transform: scale(0.9); }

        .zekr-category {
            display: inline-block;
            padding: 5px 15px;
            background: var(--accent-color);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        /* أزرار التحكم السفلية */
        .nav-controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--main-color);
            transition: 0.3s;
        }

        .action-btn:hover { background: var(--main-color); color: white; }

        /* القائمة الجانبية المعتادة */
        .menu-wrapper { position: fixed; bottom: 20px; left: 20px; }
        .menu-toggle { background: var(--main-color); color: white; border: none; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        .side-menu {
            position: absolute; bottom: 70px; left: 0;
            background: white; width: 180px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden;
        }
        .side-menu.active { display: flex; }
        .menu-item { padding: 15px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="azkar-header">
        <h1>أذكاري</h1>
        <p>أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ</p>
    </div>

    <div class="azkar-container">
        <div class="azkar-card">
            <div id="category" class="zekr-category">أذكار الصباح</div>
            <div id="zekr-display" class="zekr-text">جاري التحميل...</div>
            
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">اضغط على العداد للتسبيح</p>
            <div id="counter-btn" class="count-circle" onclick="countPress()">0</div>
            
            <div id="target" style="font-size: 0.9rem; color: #666;">التكرار المطلوب: 1</div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="action-btn" onclick="prevZekr()">🔙</button>
        <button class="action-btn" onclick="speakZekr()">🔊</button>
        <button class="action-btn" onclick="nextZekr()">🔜</button>
    </div>

    <div class="menu-wrapper">
        <div id="sideMenu" class="side-menu">
            <a href="index.html" class="menu-item">الرئيسية</a>
            <div class="menu-item" onclick="location.reload()">تحديث الأذكار</div>
            <div class="menu-item" onclick="alert('تم الحفظ')">حفظ التقدم</div>
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>

    <script>
        const azkarData = [
            { t: "أَصْبَحْنَا وَأَصْبَحَ المُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ", c: "أذكار الصباح", r: 1 },
            { t: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ", c: "تسبيح", r: 100 },
            { t: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ", c: "سيد الاستغفار", r: 1 },
            { t: "لا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ", c: "كنوز الجنة", r: 33 },
            { t: "اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبَيِّنَا مُحَمَّدٍ", c: "الصلاة على النبي", r: 10 }
        ];

        let currentIndex = 0;
        let userCount = 0;

        function updateDisplay() {
            const item = azkarData[currentIndex];
            document.getElementById('zekr-display').innerText = item.t;
            document.getElementById('category').innerText = item.c;
            document.getElementById('target').innerText = `التكرار المطلوب: ${item.r}`;
            userCount = 0;
            document.getElementById('counter-btn').innerText = userCount;
            
            // إضافة حركة أنيميشن عند التغيير
            const card = document.querySelector('.azkar-card');
            card.style.transform = "rotateY(10deg)";
            setTimeout(() => card.style.transform = "rotateY(0deg)", 300);
        }

        function countPress() {
            const target = azkarData[currentIndex].r;
            if (userCount < target) {
                userCount++;
                document.getElementById('counter-btn').innerText = userCount;
                if (userCount === target) {
                    document.getElementById('counter-btn').style.background = "#97bc62";
                    document.getElementById('counter-btn').style.color = "white";
                    navigator.vibrate(100); // هزاز بسيط عند الانتهاء
                }
            } else {
                nextZekr(); // انتقل للذكر التالي تلقائياً عند الانتهاء
            }
        }

        function nextZekr() {
            currentIndex = (currentIndex + 1) % azkarData.length;
            document.getElementById('counter-btn').style.background = "white";
            document.getElementById('counter-btn').style.color = "var(--main-color)";
            updateDisplay();
        }

        function prevZekr() {
            currentIndex = (currentIndex - 1 + azkarData.length) % azkarData.length;
            updateDisplay();
        }

        function speakZekr() {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(azkarData[currentIndex].t);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
